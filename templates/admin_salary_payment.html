<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salary Payment</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc;}
.wrapper{display:flex;height:100vh;}
.sidebar{
  width:260px;background:#0f172a;color:#fff;padding:24px;
}
.sidebar a{
  display:block;padding:12px;color:#cbd5f5;
  text-decoration:none;border-radius:8px;margin-bottom:8px;
}
.sidebar a.active,.sidebar a:hover{
  background:#1e293b;color:#fff;
}
.content{flex:1;padding:32px;}
.card{
  background:#fff;padding:24px;border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  margin-bottom:24px;
}
select,input,textarea{
  padding:10px;border-radius:8px;border:1px solid #e5e7eb;
}
button{
  background:#2563eb;color:#fff;border:none;
  padding:10px 16px;border-radius:8px;cursor:pointer;
}
.alert{
  padding:12px;border-radius:8px;
  background:#fee2e2;color:#991b1b;margin-bottom:16px;
}
.success{
  background:#ecfdf5;color:#065f46;
}
</style>
</head>

<body>
<div class="wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>HRMS</h2>
    <a href="/admin/hrms">📊 Dashboard</a>
    <a href="/admin/hrms/attendance">🕒 Attendance</a>
    <a href="/admin/hrms/leaves">📝 Leaves</a>
    <a href="/admin/hrms/salary-settings">💰 Salary Settings</a>
    <a href="/admin/hrms/salary-calculation">📐 Salary Calculation</a>
    <a class="active" href="/admin/hrms/salary-payment">💳 Salary Payment</a>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="card">
      <h3>Process Salary Payment</h3>

      {% if already_paid %}
        <div class="alert">Salary already paid for this worker & month</div>
      {% endif %}

      <form method="POST">
        <select name="worker_id" required>
          <option value="">Select Worker</option>
          {% for w in workers %}
          <option value="{{ w.id }}">{{ w.username }}</option>
          {% endfor %}
        </select>

        <input type="month" name="month" required>

        <button>Calculate</button>
      </form>
    </div>

    {% if result %}
    <div class="card">
      <h3>Confirm Payment</h3>

      <form method="POST" action="/admin/hrms/salary-payment/confirm">
        <input type="hidden" name="worker_id" value="{{ result.worker_id }}">
        <input type="hidden" name="month" value="{{ result.month }}">
        <input type="hidden" name="amount" value="{{ result.total }}">

        <p><strong>Amount:</strong> ₹ {{ result.total }}</p>

        <textarea name="remarks" placeholder="Remarks (optional)"></textarea><br><br>

        <button>Pay Salary</button>
      </form>
    </div>
    {% endif %}

  </main>
</div>
</body>
</html>
