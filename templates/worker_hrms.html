{% extends "layout.html" %}
{% block content %}

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== HRMS LAYOUT ===== */
.hrms-wrapper {
  display: flex;
  width: 100%;
  height: 100vh;
  background: #f3f4f6;
}

/* ===== LEFT SIDEBAR ===== */
.hrms-sidebar {
  width: 240px;
  background: #0f172a;
  color: #ffffff;
  padding: 20px;
}

.hrms-sidebar h2 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 25px;
  color: #38bdf8;
}

.hrms-sidebar ul {
  list-style: none;
}

.hrms-sidebar li {
  margin-bottom: 12px;
}

.hrms-sidebar a {
  display: block;
  padding: 12px 16px;
  color: #e5e7eb;
  text-decoration: none;
  border-radius: 8px;
  font-size: 15px;
  transition: 0.3s;
}

.hrms-sidebar a:hover {
  background: #1e293b;
  color: #ffffff;
}

/* ===== RIGHT CONTENT ===== */
.hrms-content {
  flex: 1;
  background: #ffffff;
  padding: 30px;
  overflow-y: auto;
}

.hrms-content h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.hrms-content p {
  color: #6b7280;
  margin-bottom: 25px;
}

/* ===== CARD ===== */
.hrms-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  padding: 20px;
  border-radius: 10px;
}
</style>

<div class="hrms-wrapper">

  <!-- LEFT HRMS SIDEBAR -->
  <aside class="hrms-sidebar">
    <h2>HRMS</h2>
    <ul>
      <li><a href="{{ url_for('worker_attendance') }}">🕒 Attendance</a></li>
      <li><a href="{{ url_for('worker_leave') }}">📝 Apply Leave</a></li>
      <li><a href="{{ url_for('worker_payslip') }}">💰 Payslip</a></li>
      <li><a href="{{ url_for('worker_hr_contact') }}">📩 Contact HR</a></li>
    </ul>
  </aside>

  <!-- RIGHT CONTENT -->
  <main class="hrms-content">
    <h1>Worker HRMS</h1>
    <p>Select an option from the left menu to continue.</p>

    <div class="hrms-card">
      <p>HRMS modules will load here.</p>
    </div>
  </main>

</div>

{% endblock %}
