<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Attendance History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        h3 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 22px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead th {
            background-color: #2563eb;
            color: #ffffff;
            text-align: left;
            padding: 12px;
            font-size: 14px;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            color: #374151;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        .status-present {
            color: #16a34a;
            font-weight: 600;
        }

        .status-late {
            color: #d97706;
            font-weight: 600;
        }

        .status-absent {
            color: #dc2626;
            font-weight: 600;
        }

        .no-records {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                font-size: 13px;
            }

            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h3>My Attendance History</h3>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            {% if records %}
                {% for r in records %}
                <tr>
                    <td>{{ r.date }}</td>
                    <td>{{ r.time }}</td>
                    <td class="
                        {% if r.status == 'Present' %}status-present
                        {% elif r.status == 'Late' %}status-late
                        {% elif r.status == 'Absent' %}status-absent
                        {% endif %}
                    ">
                        {{ r.status }}
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="3" class="no-records">
                        No attendance records found.
                    </td>
                </tr>
            {% endif %}
        </tbody>
    </table>

    <a href="/worker/hrms/attendance" class="back-link">
        ← Back to Attendance
    </a>
</div>

</body>
</html>
