<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workers Management</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: #f8fafc;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* LEFT SIDEBAR */
    .sidebar {
      width: 240px;
      background: #0f172a;
      color: #fff;
      padding: 20px 0;
    }

    .sidebar h2 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 28px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar li a {
      display: block;
      padding: 12px 24px;
      color: #cbd5f5;
      text-decoration: none;
      font-size: 14px;
    }

    .sidebar li.active a,
    .sidebar li a:hover {
      background: #1e293b;
      color: #fff;
    }

    /* RIGHT CONTENT */
    .content {
      flex: 1;
      padding: 32px;
    }

    /* PAGE STYLES */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #475569;
    }

    input {
      height: 42px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #475569;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      font-size: 12px;
      text-transform: uppercase;
      color: #475569;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .actions form {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>
<div class="app">

  <!-- LEFT MENU -->
  <aside class="sidebar">
    <h2>Niva Admin</h2>
    <ul>
      <li><a href="/admin/dashboard">🏠 Dashboard</a></li>
      <li class="active"><a href="/admin/workers">👥 Workers</a></li>
    </ul>
  </aside>

  <!-- RIGHT CONTENT -->
  <main class="content">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>Workers Management</h1>
      <p>Add, remove or reset worker accounts</p>
    </div>

    <!-- ADD WORKER -->
    <div class="card">
      <h3 style="margin-bottom:16px;">Add New Worker</h3>

      <form method="POST" action="/admin/workers/add">
        <div class="form-grid">
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
          </div>
        </div>

        <div style="margin-top:16px;">
          <button class="btn-primary">Create Worker</button>
        </div>
      </form>
    </div>

    <!-- WORKERS LIST -->
    <div class="card">
      <h3 style="margin-bottom:16px;">Existing Workers</h3>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>

        {% for worker in workers %}
          <tr>
            <td>{{ worker.id }}</td>
            <td>{{ worker.username }}</td>
            <td>{{ worker.created_at }}</td>
            <td class="actions">

              <!-- RESET PASSWORD -->
              <form method="POST" action="/admin/workers/reset/{{ worker.id }}">
                <input type="password" name="new_password" placeholder="New password" required>
                <button class="btn-secondary">Reset</button>
              </form>

              <!-- DELETE -->
              <a href="/admin/workers/delete/{{ worker.id }}"
                 onclick="return confirm('Delete this worker?')">
                <button class="btn-danger">Delete</button>
              </a>

            </td>
          </tr>
        {% else %}
          <tr>
            <td colspan="4" style="text-align:center;color:#64748b;">
              No workers found
            </td>
          </tr>
        {% endfor %}

        </tbody>
      </table>
    </div>

  </main>
</div>
</body>
</html>
