<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Lead | Niva Health Kare</title>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  body {
    background: #f4f6f9;
  }

  .app-shell {
    display: flex;
    height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 240px;
    background: #0f766e;
    color: #fff;
    padding: 20px 16px;
    flex-shrink: 0;
  }

  .sidebar .logo {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 24px;
  }

  .sidebar ul {
    list-style: none;
  }

  .sidebar li {
    margin-bottom: 8px;
  }

  .sidebar a {
    display: block;
    padding: 10px 12px;
    text-decoration: none;
    color: #e6fffa;
    border-radius: 4px;
  }

  .sidebar a:hover,
  .sidebar .active a {
    background: #14b8a6;
    color: #003b36;
  }

  /* ===== MAIN ===== */
  .main-content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }

  .page-header {
    margin-bottom: 18px;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
  }

  .page-header p {
    font-size: 13px;
    color: #6b7280;
  }

  /* ===== FORM ===== */
  .form-card {
    background: #fff;
    padding: 24px;
    border-radius: 16px;
    max-width: 900px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
  }

  .form-group textarea {
    min-height: 90px;
    resize: vertical;
  }

  .form-actions {
    margin-top: 20px;
  }

  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-save {
    background: #0ea5a4;
    color: #fff;
  }

  .btn-save:hover {
    background: #0f766e;
  }

  .btn-cancel {
    background: #e5e7eb;
    color: #374151;
    text-decoration: none;
    margin-left: 10px;
  }
  </style>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Niva Health Kare</div>
    <ul>
      <li><a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a></li>
      <li class="active"><a href="{{ url_for('admin_leads') }}">🧾 Web Leads</a></li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <div class="page-header">
      <h1>Edit Lead</h1>
      <p>Update web enquiry details</p>
    </div>

    <div class="form-card">
      <form method="POST">

        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" value="{{ lead.name }}" required>
        </div>

        <div class="form-group">
          <label>Mobile</label>
          <input type="text" name="mobile" value="{{ lead.mobile }}" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ lead.email }}">
        </div>

        <div class="form-group">
          <label>Service</label>
          <input type="text" name="service" value="{{ lead.service }}">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" name="address" value="{{ lead.address }}">
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea name="message">{{ lead.message }}</textarea>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="New" {{ 'selected' if lead.status == 'New' else '' }}>New</option>
            <option value="Pending" {{ 'selected' if lead.status == 'Pending' else '' }}>Pending</option>
            <option value="Completed" {{ 'selected' if lead.status == 'Completed' else '' }}>Completed</option>
          </select>
        </div>

        <div class="form-group">
          <label>Payment</label>
          <select name="payment_type">
            <option value="Pending" {{ 'selected' if lead.payment_type == 'Pending' else '' }}>Pending</option>
            <option value="Paid" {{ 'selected' if lead.payment_type == 'Paid' else '' }}>Paid</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-save">💾 Save Changes</button>
          <a href="{{ url_for('admin_leads') }}" class="btn btn-cancel">Cancel</a>
        </div>

      </form>
    </div>

  </main>
</div>

</body>
</html>
