<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Joining Letter Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
        }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background-color: #1f2937;
            color: #ffffff;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #374151;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            color: #d1d5db;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .sidebar a:hover {
            background-color: #374151;
            color: #ffffff;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            max-width: 700px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #111827;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .flash-success {
            background-color: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #86efac;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <h2>HRMS</h2>
        <a href="{{ url_for('admin_hrms') }}">🏠 Dashboard</a>
        <a href="{{ url_for('admin_hrms') }}">⬅ Back</a>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="content">
        <div class="card">

            <h2>Joining Letter Generator</h2>

            <!-- Flash message -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-success">
                    {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <form method="post">

                <label>Employee Name</label>
                <input type="text" name="employee_name" required>

                <label>Designation</label>
                <input type="text" name="designation" required>

                <label>Department</label>
                <input type="text" name="department" required>

                <label>Joining Date</label>
                <input type="date" name="joining_date" required>

                <label>Salary</label>
                <input type="text" name="salary" required>

                <label>Employment Type</label>
                <select name="employment_type" required>
                    <option value="">Select</option>
                    <option value="Full Time">Full Time</option>
                    <option value="Part Time">Part Time</option>
                    <option value="Contract">Contract</option>
                </select>

                <label>Work Location</label>
                <input type="text" name="work_location" required>

                <button type="submit">Generate Joining Letter</button>
            </form>

        </div>
    </div>

</div>

</body>
</html>
