{% extends "layout.html" %}
{% block content %}

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  background: #f4f6f9;
}

/* ==============================
   FIXED SIDEBAR
================================ */
.sidebar {
  width: 220px;
  background: #0f766e;
  color: #fff;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  padding: 20px 14px;
}

.sidebar .logo {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 24px;
}

.sidebar ul {
  list-style: none;
}

.sidebar li {
  margin-bottom: 6px;
}

.sidebar a {
  display: block;
  padding: 10px 12px;
  font-size: 14px;
  text-decoration: none;
  color: #e6fffa;
  border-radius: 6px;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.12);
}

.sidebar li.active a {
  background: #14b8a6;
  color: #003b36;
  font-weight: 600;
}

/* ==============================
   MAIN CONTENT (SHIFTED)
================================ */
.main-content {
  margin-left: 220px;
  padding: 24px;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.page-header {
  margin-bottom: 20px;
}

.page-header h1 {
  font-size: 22px;
  font-weight: 600;
}

.page-header p {
  font-size: 13px;
  color: #6b7280;
}

/* ===== FORM CARD ===== */
.form-card {
  background: #fff;
  padding: 24px;
  max-width: 640px;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
}

/* ===== FORM ===== */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #374151;
}

.form-group input,
.form-group select {
  width: 100%;
  height: 40px;
  padding: 8px 12px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 14px;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #0f766e;
}

/* ===== ACTIONS ===== */
.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
}

.btn-save {
  background: #0f766e;
  color: #fff;
}

.btn-save:hover {
  background: #115e59;
}

.btn-cancel {
  background: #e5e7eb;
  color: #374151;
}

.btn-cancel:hover {
  background: #d1d5db;
}
</style>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Niva Admin</div>
  <ul>
    <li><a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a></li>
    <li><a href="{{ url_for('admin_leads') }}">🧾 Web Leads</a></li>
    <li class="active"><a href="{{ url_for('admin_appointments') }}">📅 Appointments</a></li>
    <li><a href="{{ url_for('admin_tasks') }}">✅ Tasks</a></li>
    <li><a href="{{ url_for('admin_workers') }}">👥 Workers</a></li>
    <li><a href="{{ url_for('admin_hrms') }}">🧑‍💼 HRMS</a></li>
    <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
  </ul>
</aside>

<!-- MAIN -->
<main class="main-content">

  <div class="page-header">
    <h1>Edit Appointment</h1>
    <p>Update patient appointment details</p>
  </div>

  <div class="form-card">
    <form method="POST">

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ appointment.name }}" required>
      </div>

      <div class="form-group">
        <label>Mobile</label>
        <input type="text" name="mobile" value="{{ appointment.mobile }}" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ appointment.email }}">
      </div>

      <div class="form-group">
        <label>Service</label>
        <input type="text" name="service" value="{{ appointment.service }}">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ appointment.address }}">
      </div>

      <div class="form-group">
        <label>Payment</label>
        <select name="payment">
          <option value="Pending" {{ 'selected' if appointment.payment == 'Pending' else '' }}>Pending</option>
          <option value="Paid" {{ 'selected' if appointment.payment == 'Paid' else '' }}>Paid</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="Scheduled" {{ 'selected' if appointment.status == 'Scheduled' else '' }}>Scheduled</option>
          <option value="Completed" {{ 'selected' if appointment.status == 'Completed' else '' }}>Completed</option>
          <option value="Pending" {{ 'selected' if appointment.status == 'Pending' else '' }}>Pending</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-save">💾 Save Changes</button>
        <a href="{{ url_for('admin_appointments') }}" class="btn btn-cancel">Cancel</a>
      </div>

    </form>
  </div>

</main>

{% endblock %}
