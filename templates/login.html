<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Niva Health Kare | Login</title>

<style>
/* ===== Base ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background: #f4f6f8;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease;
}

body.dark {
  background: #0f172a;
}

/* ===== Card ===== */
.login-card {
  width: 380px;
  background: #ffffff;
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: background 0.3s ease;
}

body.dark .login-card {
  background: #020617;
}

/* ===== Header ===== */
.header {
  text-align: center;
  margin-bottom: 22px;
}

.header svg {
  width: 42px;
  height: 42px;
  color: #16a34a;
  margin-bottom: 8px;
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: #020617;
}

body.dark .header h1 {
  color: #e5e7eb;
}

.header p {
  font-size: 13px;
  color: #64748b;
}

/* ===== Form ===== */
.form-group {
  margin-bottom: 16px;
}

label {
  font-size: 13px;
  color: #334155;
  margin-bottom: 6px;
  display: block;
}

body.dark label {
  color: #cbd5f5;
}

input, select {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 14px;
  background: transparent;
  outline: none;
}

body.dark input,
body.dark select {
  border-color: #334155;
  color: #e5e7eb;
}

input:focus, select:focus {
  border-color: #16a34a;
}

/* ===== Password ===== */
.password-wrap {
  position: relative;
}

.toggle-pass {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  cursor: pointer;
  color: #16a34a;
}

/* ===== Button ===== */
.login-btn {
  width: 100%;
  padding: 12px;
  background: #16a34a;
  border: none;
  border-radius: 8px;
  color: #ffffff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

.login-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

/* ===== Footer ===== */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  font-size: 12px;
  color: #64748b;
}

/* ===== Dark Toggle ===== */
.dark-toggle {
  cursor: pointer;
  font-size: 12px;
  color: #16a34a;
}

/* ===== Loader ===== */
.loader {
  display: none;
  margin-left: 8px;
  width: 14px;
  height: 14px;
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="login-card">

  <!-- Header -->
  <div class="header">
    <!-- Medical Icon -->
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        d="M12 6v12m6-6H6"/>
    </svg>
    <h1>Niva Health Kare</h1>
    <p>Office Login Portal</p>
  </div>

  <!-- Form -->
  <form method="POST" action="{{ url_for('login') }}" onsubmit="loginLoading()">

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="form-group password-wrap">
      <label>Password</label>
      <input type="password" id="password" name="password" required>
      <span class="toggle-pass" onclick="togglePassword()">Show</span>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select name="role" required>
        <option value="">Select</option>
        <option value="admin">Admin</option>
        <option value="worker">Staff</option>
      </select>
    </div>

    <button class="login-btn" id="loginBtn">
      Login
      <span class="loader" id="loader"></span>
    </button>

  </form>

  <!-- Footer -->
  <div class="footer">
    <span>© 2026</span>
    <span class="dark-toggle" onclick="toggleDark()">Dark Mode</span>
  </div>

</div>

<script>
function togglePassword() {
  const pass = document.getElementById("password");
  const text = event.target;
  if (pass.type === "password") {
    pass.type = "text";
    text.innerText = "Hide";
  } else {
    pass.type = "password";
    text.innerText = "Show";
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

function loginLoading() {
  document.getElementById("loader").style.display = "inline-block";
  document.getElementById("loginBtn").disabled = true;
}
</script>

</body>
</html>
